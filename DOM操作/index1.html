<html>
  <body>
    <input id="text" class="fruits" placeholder="hello">
    <p id="p"></p>
    <p id="p2"></p>
    <script>
      const element = document.getElementById("text");
      // 属性の値を取得する方法。この場合だと "hello"　を取得していることになる。
      const placeholderValue = element.getAttribute("placeholder");
      const p = document.getElementById("p");
      p.textContent = placeholderValue;
    </script>
  </body>
</html>
